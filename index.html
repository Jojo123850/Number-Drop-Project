<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AirQuality</title>
    <link rel="stylesheet" href="style.css">

</head>
<body>
    
    <span class="palm-left">🌴</span>
    <span class="palm-right">🌴</span>

    <h1 class="game-title">NUMBER DROP</h1>
    <div id="game"></div>

<button id="button">Start</button>

<div class="hud">
    <p>Score : <span id="score">0</span></p>
    <p>Temps : <span id="temps">10</span></p>
</div>

<div id="overlay" style="display:none" >
    <div id="modal">
        <h2>Temps écoulé !</h2>
        <p>Score final : <span id="scoreFinal"></span></p>
        <button id="restart">Rejouer</button>
    </div>
</div>
    
<script src="script.js"></script>
</body>
</html>
